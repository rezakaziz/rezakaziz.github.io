  - title: Coding Projects
    description: "Engineering projects focused on systems, DevOps, and full-stack development"
    portfolioitem:
      - name: Orthoman
        image: "/images/portfolio/orthoman.png"
        link: ""
        linktext: "View project"
        description: "A cloud-native full-stack medical cabinet management application built with Django, PostgreSQL, and React. The platform is containerized using Docker and leverages Redis for real-time features and caching. It supports patient management, scheduling, billing, chat, and real-time synchronization. The application is deployed in a medical cabinet and actively maintained in production. It follows modern DevOps practices with automated CI/CD pipelines powered by GitHub Actions for continuous integration, testing, and deployment, ensuring scalability, reliability, and rapid delivery."
        tags:
          - Django
          - React
          - PostgreSQL
          - Docker
          - Redis
          - CI/CD
          - GitHub Actions
          - Cloud Native
          - DevOps
          - Production
        status: "In Progress"
        start: "2025"
        authors:
          - Rezak AZIZ
      - name: Lykeio
        image: "/images/portfolio/lykeio.png"
        link: "https://github.com/rezakaziz/Lykeio-Linux"
        linktext: "View project"
        description: "A custom lightweight Linux distribution designed for educational environments. It enables the reuse of obsolete hardware by transforming machines into efficient thin clients, reducing costs and improving accessibility."
        tags:
          - Linux
          - System Design
          - Bash
          - Networking
        status: "Finished"
