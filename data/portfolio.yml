          - Nassim Sehdi
      - name: Hospital IDS Deployment (Snort)
        image: "/images/portfolio/snort.jpeg"
        link: "/documents/portfolio/SNORT.pdf"
        linktext: "View Report"
        description: "Design and deployment of a network-based intrusion detection system (NIDS) using Snort within a hospital infrastructure. The project involved analyzing the existing network architecture, positioning the IDS strategically, configuring a Linux-based gateway, and implementing rule-based detection for real-time monitoring of network traffic. It included malware analysis, custom rule creation, and validation through simulated attacks. The solution enhanced the security posture of the hospital by enabling continuous monitoring and alerting of suspicious activities."
        tags:
          - Cybersecurity
          - Network Security
          - IDS
          - Snort
          - Linux
          - Networking
          - Malware Analysis
        status: "Finished"
        start: "2021"
        end: "2021"
        authors:
          - Rezak AZIZ
          - Lounes MECHOUEK
      - name: VM-Manager
        image: "/images/portfolio/vm-manager.jpg"
        link: "https://github.com/rezakaziz/VM-Manager"
        linktext: "View project"
        description: "A Python-based virtual machine management tool built on top of libvirt. It allows creation, monitoring, and orchestration of KVM virtual machines through a simplified interface, designed to improve infrastructure control and automation."
        tags:
